name = "crucible"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# ─── PUBLISH TARGET (deploy guard: workers.dev OFF) ─────────────────────────────
# Phase 0 ships a hello-world Worker. The only intended public address is the custom
# domain below; workers.dev stays OFF. The [SECURITY/Opus] inbound stack (headers,
# CORS, body cap, per-IP rate limits) wraps /api and /gate as those surfaces land.
workers_dev = false

[[routes]]
pattern = "crucible.samlatino.dev"
custom_domain = true

[observability]
enabled = true

# ─── Static assets (Design Loop token sheet + future SPA) ───────────────────────
# Serves the token sheet at `/` under both `wrangler dev` and the deployed domain.
[assets]
directory = "./public"

# ─── Bindings (added as their features land) ────────────────────────────────────
# D1: registry + results of record (Phase 1.1 — schema + versioned migrations).
[[d1_databases]]
binding = "DB"
database_name = "crucible"
database_id = "b7835a1a-0b8a-43c5-b404-3d657f7eab46"
migrations_dir = "migrations"

# R2: content-addressed judge transcripts + raw model outputs (Phase 1.3 — transcript writes).
[[r2_buckets]]
binding = "TRANSCRIPTS"
bucket_name = "crucible-transcripts"

# KV: read-heavy leaderboard aggregate cache ONLY — never a counter (ARCHITECTURE anti-list).
[[kv_namespaces]]
binding = "AGGREGATE_KV"
id = "aa6acd2c7f0a4032af659978255cc7ab"

# Workers AI: targets AND judges. Self-metered against Crucible's 2,000-neuron/day share
# by the BudgetLedger DO before every dispatch batch (the free plan errors past the cap).
[ai]
binding = "AI"

# ─── Durable Objects (SQLite-backed — free-plan requirement) ────────────────────────
# [SECURITY/Opus] BudgetLedger: ONE named instance, the serialized cost/rate-limit
# substrate. All hot counters live in its SQLite storage, NEVER KV (KV's 1k-writes/day +
# 1-write/sec/key caps cannot carry a per-dispatch ledger).
[[durable_objects.bindings]]
name = "BUDGET_LEDGER"
class_name = "BudgetLedger"

# RunOrchestrator: one instance per run — the SQLite state machine + alarm dispatch engine.
[[durable_objects.bindings]]
name = "RUN_ORCHESTRATOR"
class_name = "RunOrchestrator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BudgetLedger", "RunOrchestrator"]
